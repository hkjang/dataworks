apiVersion: v1
kind: Namespace
metadata:
  name: clustara-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: clustara-agent
  namespace: clustara-system
---
apiVersion: v1
kind: Secret
metadata:
  name: clustara-agent-auth
  namespace: clustara-system
type: Opaque
stringData:
  token: REPLACE_WITH_CLUSTARA_ADMIN_TOKEN
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: clustara-agent-readonly
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - nodes
      - pods
      - services
      - persistentvolumeclaims
      - secrets
      - events
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - roles
      - clusterroles
      - rolebindings
      - clusterrolebindings
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: clustara-agent-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: clustara-agent-readonly
subjects:
  - kind: ServiceAccount
    name: clustara-agent
    namespace: clustara-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clustara-agent
  namespace: clustara-system
  labels:
    app.kubernetes.io/name: clustara-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clustara-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clustara-agent
    spec:
      serviceAccountName: clustara-agent
      containers:
        - name: agent
          image: ghcr.io/hkjang/clustara:v0.4.0
          imagePullPolicy: IfNotPresent
          command: ["/app/clustara-agent"]
          env:
            - name: CLUSTARA_CLUSTER_ID
              value: REPLACE_WITH_CLUSTER_ID
            - name: CLUSTARA_AGENT_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: CLUSTARA_AGENT_VERSION
              value: v0.4.0
            - name: CLUSTARA_URL
              value: https://REPLACE_WITH_CLUSTARA_URL
            - name: CLUSTARA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: clustara-agent-auth
                  key: token
            - name: CLUSTARA_AGENT_BATCH_INTERVAL
              value: 2s
            - name: CLUSTARA_AGENT_HEARTBEAT_INTERVAL
              value: 30s
            - name: CLUSTARA_AGENT_QUEUE_SIZE
              value: "2000"
            - name: CLUSTARA_AGENT_MAX_BATCH_SIZE
              value: "200"
          volumeMounts:
            - name: state
              mountPath: /var/lib/clustara-agent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: state
          emptyDir: {}
